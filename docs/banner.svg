<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11111b"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5"/>
      <stop offset="25%" style="stop-color:#89dceb"/>
      <stop offset="50%" style="stop-color:#89b4fa"/>
      <stop offset="75%" style="stop-color:#b4befe"/>
      <stop offset="100%" style="stop-color:#cba6f7"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5;stop-opacity:0.10"/>
      <stop offset="50%" style="stop-color:#89b4fa;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89dceb;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#94e2d5;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="wave3" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#b4befe;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#89b4fa;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#94e2d5"/>
      <stop offset="35%" style="stop-color:#89dceb"/>
      <stop offset="50%" style="stop-color:#89b4fa"/>
      <stop offset="65%" style="stop-color:#b4befe"/>
      <stop offset="85%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ripple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#94e2d5;stop-opacity:0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="800" height="280" rx="12" fill="none" stroke="#313244" stroke-width="1"/>

  <!-- Water wave shapes -->
  <path d="M0,180 Q100,160 200,170 T400,155 T600,165 T800,145 L800,280 L0,280 Z" fill="url(#wave1)"/>
  <path d="M0,210 Q150,185 300,200 T600,190 T800,175 L800,280 L0,280 Z" fill="url(#wave2)"/>
  <path d="M0,240 Q200,220 400,235 T800,215 L800,280 L0,280 Z" fill="url(#wave3)"/>

  <!-- Tidepool ripple circles — concentric rings -->
  <g opacity="0.05">
    <circle cx="680" cy="80" r="30" fill="none" stroke="#89b4fa" stroke-width="1"/>
    <circle cx="680" cy="80" r="50" fill="none" stroke="#89dceb" stroke-width="0.8"/>
    <circle cx="680" cy="80" r="70" fill="none" stroke="#94e2d5" stroke-width="0.6"/>
    <circle cx="680" cy="80" r="90" fill="none" stroke="#b4befe" stroke-width="0.4"/>
    <circle cx="120" cy="220" r="20" fill="none" stroke="#94e2d5" stroke-width="0.8"/>
    <circle cx="120" cy="220" r="35" fill="none" stroke="#89dceb" stroke-width="0.6"/>
    <circle cx="120" cy="220" r="50" fill="none" stroke="#89b4fa" stroke-width="0.4"/>
  </g>

  <!-- Terminal cursor blink — decorative -->
  <g opacity="0.06">
    <path d="M60,50 Q200,35 340,60 Q480,85 620,55 Q720,35 780,48" fill="none" stroke="#94e2d5" stroke-width="1.5"/>
    <path d="M30,70 Q170,55 310,78 Q460,100 640,68 Q740,50 790,62" fill="none" stroke="#89b4fa" stroke-width="1"/>
    <path d="M45,60 Q185,45 325,70 Q470,93 630,62 Q730,42 785,55" fill="none" stroke="#b4befe" stroke-width="1"/>
  </g>

  <!-- Decorative dots — data particles -->
  <g opacity="0.10">
    <circle cx="680" cy="50" r="1.5" fill="#94e2d5"/>
    <circle cx="700" cy="42" r="1" fill="#89dceb"/>
    <circle cx="720" cy="55" r="1.5" fill="#89b4fa"/>
    <circle cx="695" cy="65" r="1" fill="#b4befe"/>
    <circle cx="715" cy="38" r="1" fill="#cba6f7"/>
    <circle cx="740" cy="48" r="1.5" fill="#94e2d5"/>
    <circle cx="660" cy="58" r="1" fill="#89dceb"/>
    <circle cx="750" cy="60" r="1" fill="#89b4fa"/>
    <circle cx="670" cy="40" r="1.5" fill="#b4befe"/>
    <circle cx="755" cy="42" r="1" fill="#94e2d5"/>
    <circle cx="80" cy="210" r="1.5" fill="#89b4fa"/>
    <circle cx="60" cy="220" r="1" fill="#94e2d5"/>
    <circle cx="100" cy="225" r="1.5" fill="#89dceb"/>
    <circle cx="75" cy="235" r="1" fill="#b4befe"/>
    <circle cx="45" cy="215" r="1" fill="#94e2d5"/>
    <circle cx="115" cy="218" r="1" fill="#cba6f7"/>
    <circle cx="130" cy="230" r="1.5" fill="#89b4fa"/>
    <circle cx="50" cy="240" r="1" fill="#89dceb"/>
  </g>

  <!-- Terminal prompt decoration -->
  <g opacity="0.08" transform="translate(55, 85)">
    <text font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
          font-size="11" fill="#a6e3a1">visitor@tidepool:~$</text>
    <rect x="145" y="-10" width="7" height="13" fill="#a6e3a1" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="400" y="125" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="64" font-weight="bold" fill="url(#title-grad)" text-anchor="middle"
        letter-spacing="14" filter="url(#glow)">TIDEPOOL</text>

  <!-- Accent line under title -->
  <rect x="150" y="143" width="500" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- Subtitle -->
  <text x="400" y="175" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="13" fill="#bac2de" text-anchor="middle"
        letter-spacing="5">INTERACTIVE TERMINAL PORTFOLIO</text>

  <!-- Feature badges -->
  <g transform="translate(68, 205)">
    <!-- xterm.js -->
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#313244"/>
    <rect x="0" y="0" width="100" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="16" cy="14" r="4" fill="#94e2d5"/>
    <text x="28" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">xterm.js</text>

    <!-- virtual fs -->
    <rect x="120" y="0" width="105" height="28" rx="14" fill="#313244"/>
    <rect x="120" y="0" width="105" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="136" cy="14" r="4" fill="#89dceb"/>
    <text x="148" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">virtual fs</text>

    <!-- github api -->
    <rect x="245" y="0" width="115" height="28" rx="14" fill="#313244"/>
    <rect x="245" y="0" width="115" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="261" cy="14" r="4" fill="#89b4fa"/>
    <text x="273" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">github api</text>

    <!-- tab complete -->
    <rect x="380" y="0" width="125" height="28" rx="14" fill="#313244"/>
    <rect x="380" y="0" width="125" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="396" cy="14" r="4" fill="#b4befe"/>
    <text x="408" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">tab complete</text>

    <!-- catppuccin -->
    <rect x="525" y="0" width="120" height="28" rx="14" fill="#313244"/>
    <rect x="525" y="0" width="120" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="541" cy="14" r="4" fill="#cba6f7"/>
    <text x="553" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">catppuccin</text>
  </g>
</svg>
