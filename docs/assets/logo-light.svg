<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: deep sky to deep sapphire -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="40%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <!-- Icon gradient: vertical for the mark -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="50%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>

    <!-- Faint outer glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#0284c7" flood-opacity="0.1" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame — thin, elegant -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#0284c7" opacity="0.04"/>

    <!-- === LOGOMARK: Contained Pool === -->

    <!-- Circular pool outline -->
    <circle cx="80" cy="70" r="32" fill="none" stroke="url(#g1)" stroke-width="1.2" opacity="0.7"/>
    <circle cx="80" cy="70" r="28" fill="none" stroke="#0284c7" stroke-width="0.5" opacity="0.25"/>

    <!-- Inner pool surface shimmer -->
    <ellipse cx="80" cy="64" rx="22" ry="8" fill="none" stroke="#0284c7" stroke-width="0.6" opacity="0.3"/>
    <ellipse cx="80" cy="68" rx="18" ry="6" fill="none" stroke="#0369a1" stroke-width="0.4" opacity="0.2"/>

    <!-- Ecosystem dots inside the pool -->
    <circle cx="68" cy="62" r="2" fill="#0284c7" opacity="0.6"/>
    <circle cx="88" cy="66" r="1.8" fill="#0369a1" opacity="0.55"/>
    <circle cx="75" cy="76" r="2.2" fill="#0284c7" opacity="0.5"/>
    <circle cx="94" cy="78" r="1.5" fill="#0369a1" opacity="0.45"/>
    <circle cx="64" cy="72" r="1.4" fill="#0284c7" opacity="0.4"/>
    <circle cx="83" cy="84" r="1.6" fill="#0369a1" opacity="0.5"/>
    <circle cx="72" cy="54" r="1.3" fill="#0284c7" opacity="0.35"/>
    <circle cx="98" cy="68" r="1.2" fill="#0369a1" opacity="0.4"/>
    <circle cx="78" cy="58" r="1.8" fill="#0284c7" opacity="0.45"/>
    <circle cx="90" cy="86" r="1.1" fill="#0369a1" opacity="0.35"/>
    <circle cx="66" cy="84" r="1.5" fill="#0284c7" opacity="0.3"/>
    <circle cx="86" cy="52" r="1" fill="#0369a1" opacity="0.3"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#0284c7" opacity="0.25"/>
    <circle cx="80" cy="134" r="2" fill="#0369a1" opacity="0.25"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "TIDEPOOL" — clean, bold, wide-tracked -->
  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="60" font-weight="800" letter-spacing="10"
        fill="url(#g1)" text-anchor="middle">TIDEPOOL</text>

  <!-- Thin separator line -->
  <line x1="280" y1="128" x2="550" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.2"/>

  <!-- Tagline — refined, subtle -->
  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#57534e" text-anchor="middle">INTERACTIVE TERMINAL PORTFOLIO</text>

  <!-- Descriptor — very subtle -->
  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#a8a29e" text-anchor="middle">XTERM.JS  ·  BROWSER  ·  SHELL</text>
</svg>
