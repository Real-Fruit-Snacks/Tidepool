<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89dceb"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#89dceb"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="220" fill="#11111b" rx="8"/>

  <!-- Hexagonal Frame -->
  <g transform="translate(100, 110)" filter="url(#softGlow)">
    <polygon points="0,-72 62.4,-36 62.4,36 0,72 -62.4,36 -62.4,-36"
             fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4"/>

    <!-- Center node -->
    <circle cx="0" cy="0" r="2" fill="#89dceb" opacity="0.6"/>
    <!-- Entry node (left) -->
    <circle cx="-62.4" cy="0" r="2" fill="#89dceb" opacity="0.5"/>
    <!-- Exit node (right) -->
    <circle cx="62.4" cy="0" r="2" fill="#89dceb" opacity="0.5"/>

    <!-- Particle dots on hex edges -->
    <circle cx="31.2" cy="-54" r="1.2" fill="#74c7ec" opacity="0.35"/>
    <circle cx="-31.2" cy="-54" r="1.2" fill="#89dceb" opacity="0.3"/>
    <circle cx="31.2" cy="54" r="1.2" fill="#74c7ec" opacity="0.3"/>
    <circle cx="-31.2" cy="54" r="1.2" fill="#89dceb" opacity="0.35"/>
    <circle cx="-55" cy="-18" r="1" fill="#74c7ec" opacity="0.25"/>
    <circle cx="55" cy="18" r="1" fill="#89dceb" opacity="0.25"/>

    <!-- LOGOMARK: Contained Pool -->
    <!-- Circular pool outline -->
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#accentGrad)" stroke-width="1.2" opacity="0.7"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#89dceb" stroke-width="0.5" opacity="0.25"/>

    <!-- Inner pool surface shimmer -->
    <ellipse cx="0" cy="-6" rx="22" ry="8" fill="none" stroke="#89dceb" stroke-width="0.6" opacity="0.3"/>
    <ellipse cx="0" cy="-2" rx="18" ry="6" fill="none" stroke="#74c7ec" stroke-width="0.4" opacity="0.2"/>

    <!-- Ecosystem dots inside the pool -->
    <circle cx="-12" cy="-8" r="2" fill="#89dceb" opacity="0.6"/>
    <circle cx="8" cy="-4" r="1.8" fill="#74c7ec" opacity="0.55"/>
    <circle cx="-5" cy="6" r="2.2" fill="#89dceb" opacity="0.5"/>
    <circle cx="14" cy="8" r="1.5" fill="#74c7ec" opacity="0.45"/>
    <circle cx="-16" cy="2" r="1.4" fill="#89dceb" opacity="0.4"/>
    <circle cx="3" cy="14" r="1.6" fill="#74c7ec" opacity="0.5"/>
    <circle cx="-8" cy="-16" r="1.3" fill="#89dceb" opacity="0.35"/>
    <circle cx="18" cy="-2" r="1.2" fill="#74c7ec" opacity="0.4"/>
    <circle cx="-2" cy="-12" r="1.8" fill="#89dceb" opacity="0.45"/>
    <circle cx="10" cy="16" r="1.1" fill="#74c7ec" opacity="0.35"/>
    <circle cx="-14" cy="14" r="1.5" fill="#89dceb" opacity="0.3"/>
    <circle cx="6" cy="-18" r="1" fill="#74c7ec" opacity="0.3"/>
  </g>

  <!-- Typography -->
  <g transform="translate(200, 0)">
    <!-- Project Name -->
    <text x="0" y="92" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="60" font-weight="800" fill="url(#textGrad)" letter-spacing="3">TIDEPOOL</text>

    <!-- Separator line -->
    <line x1="0" y1="108" x2="320" y2="108" stroke="url(#accentGrad)" stroke-width="0.8" opacity="0.4"/>

    <!-- Tagline -->
    <text x="0" y="132" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="11.5" fill="#cdd6f4" letter-spacing="2" opacity="0.85">INTERACTIVE TERMINAL PORTFOLIO</text>

    <!-- Descriptor -->
    <text x="0" y="152" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="9" fill="#a6adc8" letter-spacing="2.5" opacity="0.6">XTERM.JS · BROWSER · SHELL</text>
  </g>
</svg>